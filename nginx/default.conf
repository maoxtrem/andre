# 1. Redirección de HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bohemiancollections.com www.bohemiancollections.com;
    return 301 https://$host$request_uri;
}

# 2. Configuración para HTTPS (SSL) + App de Galería
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bohemiancollections.com www.bohemiancollections.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Certificados (Rutas dentro del contenedor)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Optimización SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # --- CAMBIO PRINCIPAL: Proxy hacia Node.js ---
    location / {
        set $gallery_upstream gallery_app:3000;
        proxy_pass http://$gallery_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Aumentar límite de subida (para que no falle al subir fotos pesadas)
        client_max_body_size 20M;
    }

    # --- Servir las imágenes directamente (Más rápido que Node) ---
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Bloquear acceso a archivos ocultos
    location ~ /\. {
        deny all;
    }
}
