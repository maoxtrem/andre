services:
  app:
    image: node:18-alpine
    container_name: gallery_app
    working_dir: /app
    volumes:
      - ./app:/app
      - ./uploads:/uploads
      - ./data:/data
    command: sh -c "npm install better-sqlite3 express multer && node server.js"
    restart: always
    expose:
      - "3000"

  proxy:
    image: nginx:stable-alpine
    container_name: web_proxy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    restart: always
